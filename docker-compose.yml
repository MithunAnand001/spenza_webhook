version: '3.9'

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: spenza_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: spenza_user
      RABBITMQ_DEFAULT_PASS: spenza_pass
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spenza_network

  backend:
    build:
      context: ./spenza-backend
      dockerfile: Dockerfile.dev
    container_name: spenza_backend
    environment:
      - NODE_ENV=development
      - DB_HOST=host.docker.internal
      - DB_USERNAME=postgres
      - DB_PASSWORD=admin123
      - DB_DATABASE=postgres
      - RABBITMQ_URL=amqp://spenza_user:spenza_pass@rabbitmq:5672
    env_file:
      - ./spenza-backend/.env
    ports:
      - "3001:3001"
    volumes:
      - ./spenza-backend:/app
      - /app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - spenza_network
    command: pnpm dev

  frontend:
    build:
      context: ./spenza-frontend
      dockerfile: Dockerfile.dev
    container_name: spenza_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./spenza-frontend:/app
      - /app/node_modules
    networks:
      - spenza_network
    command: pnpm dev --host

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  spenza_network:
    driver: bridge
